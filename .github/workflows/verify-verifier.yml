name: bundle-verifier CI
on:
  push:
    branches: [main]
    paths:
      - 'bundle-verifier/**'
      - '.github/workflows/verify-verifier.yml'
  pull_request:
    paths:
      - 'bundle-verifier/**'
      - '.github/workflows/verify-verifier.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUNDLE_FILE: "dist/index.js"
  BUNDLE_COMMAND: "npm run bundle"
  WORKDIR: "./bundle-verifier"

jobs:
  verify-self:
    name: Verify Bundle Verifier
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v7
      with:
        node-version: 24

    - name: Install
      working-directory: ${{ env.WORKDIR }}
      run: npm ci

    - name: Verify Latest Bundle
      uses: ./bundle-verifier
      with:
        bundle_file: ${{ env.BUNDLE_FILE }}
        bundle_command: ${{ env.BUNDLE_COMMAND }}
        working_directory: ${{ env.WORKDIR }}
